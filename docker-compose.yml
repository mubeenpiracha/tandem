services:
  postgres:
    image: postgres:15
    container_name: tandem_postgres
    environment:
      POSTGRES_DB: tandem_dev
      POSTGRES_USER: tandem
      POSTGRES_PASSWORD: tandem123
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tandem -d tandem_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tandem_redis
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:15
    container_name: tandem_postgres_test
    environment:
      POSTGRES_DB: tandem_test
      POSTGRES_USER: tandem
      POSTGRES_PASSWORD: tandem123
    ports:
      - "5436:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tandem -d tandem_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: