openapi: 3.0.3
info:
  title: Tandem Slack Bot API
  description: API for managing tasks detected from Slack and scheduling them in Google Calendar
  version: 1.0.0
  contact:
    name: Tandem Team

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api-dev.tandem.app/api
    description: Development environment
  - url: https://api.tandem.app/api
    description: Production environment

security:
  - BearerAuth: []

paths:
  # Authentication endpoints
  /auth/slack:
    get:
      tags: [Authentication]
      summary: Initiate Slack OAuth flow
      description: Redirects user to Slack OAuth authorization
      responses:
        '302':
          description: Redirect to Slack OAuth
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/slack/callback:
    get:
      tags: [Authentication]
      summary: Handle Slack OAuth callback
      description: Processes OAuth callback and stores tokens
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/google:
    get:
      tags: [Authentication]
      summary: Initiate Google OAuth flow
      description: Redirects user to Google OAuth authorization
      responses:
        '302':
          description: Redirect to Google OAuth
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/google/callback:
    get:
      tags: [Authentication]
      summary: Handle Google OAuth callback
      description: Processes OAuth callback and stores tokens
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/status:
    get:
      tags: [Authentication]
      summary: Get user authentication status
      description: Returns connected services and user profile
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Task management endpoints
  /tasks:
    get:
      tags: [Tasks]
      summary: Get user's tasks
      description: Retrieve tasks with optional filtering
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, scheduled, completed, dismissed]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get specific task
      description: Retrieve detailed task information
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Tasks]
      summary: Update task
      description: Update task details before or after scheduling
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{taskId}/confirm:
    post:
      tags: [Tasks]
      summary: Confirm detected task
      description: Confirm task and queue for scheduling
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task confirmed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{taskId}/dismiss:
    post:
      tags: [Tasks]
      summary: Dismiss detected task
      description: Dismiss task and mark as ignored
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task dismissed successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{taskId}/complete:
    post:
      tags: [Tasks]
      summary: Mark task as complete
      description: Complete task and remove from calendar
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # User preferences endpoints
  /preferences:
    get:
      tags: [Preferences]
      summary: Get user preferences
      description: Retrieve work hours and scheduling preferences
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Preferences]
      summary: Update user preferences
      description: Update work hours and scheduling preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkPreferencesUpdate'
      responses:
        '200':
          description: Preferences updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Slack webhook endpoints
  /webhooks/slack/events:
    post:
      tags: [Webhooks]
      summary: Handle Slack events
      description: Process incoming Slack events (mentions, DMs)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlackEvent'
      responses:
        '200':
          description: Event processed successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /webhooks/slack/interactions:
    post:
      tags: [Webhooks]
      summary: Handle Slack interactions
      description: Process button clicks and modal submissions
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: JSON payload from Slack
      responses:
        '200':
          description: Interaction processed successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  # Health and monitoring endpoints
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Check service health and dependencies
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Authentication schemas
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        user:
          $ref: '#/components/schemas/User'
      required: [token, user]

    AuthStatus:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        slackConnected:
          type: boolean
        googleConnected:
          type: boolean
        setupComplete:
          type: boolean
      required: [user, slackConnected, googleConnected, setupComplete]

    # User schemas
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        slackUserId:
          type: string
        timezone:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        createdAt:
          type: string
          format: date-time
      required: [id, email, slackUserId, timezone, status, createdAt]

    # Task schemas
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
        estimatedDuration:
          type: integer
          description: Duration in minutes
        importance:
          type: string
          enum: [Low, Medium, High]
        derivedUrgency:
          type: string
          enum: [Low, Medium, High]
        status:
          type: string
          enum: [pending, confirmed, scheduled, completed, dismissed]
        calendarEvent:
          $ref: '#/components/schemas/CalendarEvent'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, dueDate, estimatedDuration, importance, derivedUrgency, status, createdAt, updatedAt]

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
        estimatedDuration:
          type: integer
          minimum: 5
          maximum: 480
        importance:
          type: string
          enum: [Low, Medium, High]

    TaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [tasks, total, limit, offset]

    # Calendar event schemas
    CalendarEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        googleEventId:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isActive:
          type: boolean
      required: [id, googleEventId, startTime, endTime, isActive]

    # Preferences schemas
    WorkPreferences:
      type: object
      properties:
        weeklyHours:
          type: object
          additionalProperties:
            oneOf:
              - type: "null"
              - type: object
                properties:
                  start:
                    type: string
                    pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                  end:
                    type: string
                    pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                required: [start, end]
        breakTimes:
          type: object
          additionalProperties:
            type: object
            properties:
              start:
                type: string
                pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
              end:
                type: string
                pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
            required: [start, end]
        timezone:
          type: string
      required: [weeklyHours, breakTimes, timezone]

    WorkPreferencesUpdate:
      type: object
      properties:
        weeklyHours:
          type: object
          additionalProperties:
            oneOf:
              - type: "null"
              - type: object
                properties:
                  start:
                    type: string
                    pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                  end:
                    type: string
                    pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
                required: [start, end]
        breakTimes:
          type: object
          additionalProperties:
            type: object
            properties:
              start:
                type: string
                pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
              end:
                type: string
                pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
            required: [start, end]
        timezone:
          type: string

    # Webhook schemas
    SlackEvent:
      type: object
      properties:
        type:
          type: string
        event:
          type: object
          properties:
            type:
              type: string
            user:
              type: string
            text:
              type: string
            channel:
              type: string
            ts:
              type: string
            thread_ts:
              type: string
              nullable: true
        challenge:
          type: string
          nullable: true
      required: [type]

    # Health schemas
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: string
              enum: [healthy, unhealthy]
            redis:
              type: string
              enum: [healthy, unhealthy]
            slack:
              type: string
              enum: [healthy, unhealthy]
            google:
              type: string
              enum: [healthy, unhealthy]
      required: [status, timestamp, services]

    # Error schemas
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              nullable: true
          required: [code, message]
      required: [error]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'